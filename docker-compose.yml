version: '3.8'

services:

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ebarangay_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ebarangay_network

  # Backend Instance 1
  backend1:
    build: ./backend
    container_name: ebarangay_backend1
    restart: always
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - mysql
    volumes:
      - uploads_data:/app/uploads
    networks:
      - ebarangay_network

  # Backend Instance 2
  backend2:
    build: ./backend
    container_name: ebarangay_backend2
    restart: always
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - mysql
    volumes:
      - uploads_data:/app/uploads
    networks:
      - ebarangay_network

  # NGINX Load Balancer
  nginx:
    image: nginx:alpine
    container_name: ebarangay_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend1
      - backend2
    networks:
      - ebarangay_network

networks:
  ebarangay_network:
    driver: bridge

volumes:
  mysql_data:
  uploads_data: